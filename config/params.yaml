# Project-level parameters (committed to git).
# Secrets / machine-specific values belong in .env, not here.

dataset:
  name: subhamjain/loan-prediction-based-on-customer-behavior
  raw_path: data/raw
  train_file: "Training Data.csv"
  test_file: "Test Data.csv"

processed:
  path: data/processed
  train_file: train_processed.csv
  test_file: test_processed.csv

split:
  target_column: Risk_Flag
  test_size: 0.2
  random_state: 42
  stratify: true

balancing:
  method: smote
  sampling_strategy: not majority
  random_state: 42

scaling:
  method: standard

model:
  name: gradient_boosting
  params:
    n_estimators: 200
    learning_rate: 0.1
    max_depth: 5
    min_samples_split: 5
    min_samples_leaf: 1
    random_state: 42

artifacts:
  path: artifacts
  scaler_file: scaler.pkl
  model_file: model.joblib
  metrics_file: metrics.json
  preprocessor_file: preprocessor.joblib

# Intermediate artifacts produced between DVC stages (not git-tracked; DVC-tracked).
intermediate:
  splits_dir: data/processed/splits
  x_train_file: X_train.csv
  x_test_file: X_test.csv
  y_train_file: y_train.csv
  y_test_file: y_test.csv

mlflow:
  experiment_name: loan_default_prediction
  tracking_uri: https://dagshub.com/AI-ML/loan_prediction.mlflow
  # Auth (MLFLOW_TRACKING_USERNAME / MLFLOW_TRACKING_PASSWORD) lives in .env
  # The MLFLOW_TRACKING_URI env var, if set, overrides this value.
